id = "open-panel"
name = "Open Panel"
version = "0.1.0"
min_herdr_version = "0.7.4"
description = "Click-to-open Finder / Explorer / VS Code panel for Herdr workspaces, no keybinding to remember"
platforms = ["macos", "windows", "linux"]

[[build]]
command = ["python3", "-m", "pip", "install", "--user", "windows-curses"]
platforms = ["windows"]

[[panes]]
id = "open-panel"
title = "Open"
placement = "split"
command = ["python3", "app.py"]

[[actions]]
id = "open"
title = "Open Finder/Explorer/VS Code panel"
contexts = ["global"]
command = ["python3", "open_action.py"]
